<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        #auth-screen, #profile-screen {
            display: none;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.4s ease;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 1px solid #333;
            margin-bottom: 20px;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 200;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            margin: 0 0 5px 0;
            letter-spacing: -0.5px;
        }

        .username {
            font-size: 14px;
            color: #666;
            margin: 0 0 4px 0;
        }

        .userid {
            font-size: 12px;
            color: #444;
            margin-bottom: 40px;
        }

        .btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 14px 50px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.96);
            background: #cccccc;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="avatar" style="font-size: 30px;">●</div>
        <h1>Minimalist</h1>
        <div class="username" style="margin-bottom: 40px;">System Protected</div>
        <button class="btn" onclick="login()">Enter</button>
    </div>

    <div id="profile-screen">
        <div class="avatar" id="avatar-wrap">
            <span id="avatar-letter"></span>
        </div>

        <h1 id="user-name">User</h1>
        <div class="username" id="user-handle"></div>
        <div class="userid" id="user-id"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');
        tg.setBackgroundColor('#000000');

        function getUrlParam(name) {
            try {
                const params = new URLSearchParams(window.location.search);
                return params.get(name) || "";
            } catch(e) { return ""; }
        }

        function tryLoadPhoto(src, onSuccess, onFail) {
            if (!src) { onFail(); return; }
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => onSuccess(img);
            img.onerror = () => {
                if (src.includes("t.me/i/userpic")) {
                    onFail();
                } else {
                    const fallback = user_username
                        ? "https://t.me/i/userpic/320/" + user_username + ".jpg"
                        : "";
                    tryLoadPhoto(fallback, onSuccess, onFail);
                }
            };
            img.src = src;
        }

        let user_username = "";

        function login() {
            const user = tg.initDataUnsafe?.user;
            const name = user?.first_name || "User";
            const username = user?.username || "";
            const id = user?.id || "";
            user_username = username;

            document.getElementById('user-name').innerText = name;
            document.getElementById('user-handle').innerText = username ? "@" + username : "";
            document.getElementById('user-id').innerText = id ? "ID: " + id : "";

            const botPhotoUrl = getUrlParam("photo");
            const tmeUrl = username ? "https://t.me/i/userpic/320/" + username + ".jpg" : "";
            const primarySrc = botPhotoUrl || tmeUrl;

            const avatarWrap = document.getElementById('avatar-wrap');
            const avatarLetter = document.getElementById('avatar-letter');

            tryLoadPhoto(primarySrc, function(img) {
                avatarLetter.style.display = "none";
                avatarWrap.innerHTML = "";
                avatarWrap.appendChild(img);
            }, function() {
                avatarLetter.style.display = "";
                avatarLetter.innerText = name.charAt(0).toUpperCase();
            });

            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'flex';
            tg.HapticFeedback.impactOccurred('medium');
        }

        window.onload = () => {
            document.getElementById('auth-screen').style.display = 'flex';
            tg.ready();
        };
    </script>
</body>
</html>
