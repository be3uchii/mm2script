<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            color: #ffffff;
        }
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: #1a1a1a;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: 700;
            color: #ffffff;
            border: 3px solid #333333;
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .name {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
            animation: fadeIn 0.6s ease-out;
        }
        .username {
            font-size: 16px;
            color: #666666;
            margin-bottom: 40px;
            animation: fadeIn 0.7s ease-out;
        }
        .stats {
            display: flex;
            gap: 40px;
            animation: fadeIn 0.8s ease-out;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 12px;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="avatar" class="avatar"></div>
    <div id="name" class="name">Загрузка...</div>
    <div id="username" class="username"></div>
    <div class="stats">
        <div class="stat">
            <div id="userId" class="stat-value">—</div>
            <div class="stat-label">ID</div>
        </div>
        <div class="stat">
            <div id="premium" class="stat-value">—</div>
            <div class="stat-label">Premium</div>
        </div>
    </div>
    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.setBackgroundColor('#000000');
        Telegram.WebApp.setHeaderColor('#000000');
        
        const user = Telegram.WebApp.initDataUnsafe.user;
        
        if (user) {
            const firstName = user.first_name || '';
            const lastName = user.last_name || '';
            const fullName = (firstName + ' ' + lastName).trim() || 'Пользователь';
            const username = user.username ? '@' + user.username : '';
            const userId = user.id;
            const initial = firstName.charAt(0) || 'U';
            
            document.getElementById('name').textContent = fullName;
            document.getElementById('username').textContent = username;
            document.getElementById('userId').textContent = userId;
            document.getElementById('premium').textContent = user.is_premium ? '✓' : '✗';
            
            fetch(`YOUR_NGROK_URL/api/user/${userId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.photo_url) {
                        document.getElementById('avatar').innerHTML = `<img src="${data.photo_url}" alt="Avatar">`;
                    } else {
                        document.getElementById('avatar').textContent = initial;
                    }
                })
                .catch(() => {
                    document.getElementById('avatar').textContent = initial;
                });
        }
    </script>
</body>
</html>
