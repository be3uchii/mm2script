<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: slideIn 0.6s ease-out;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
        }
        .name {
            font-size: 32px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        .username {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }
        .info {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        .info-value {
            color: white;
            font-weight: 600;
            font-size: 14px;
        }
        .loading {
            color: white;
            font-size: 18px;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="content" class="loading">Загрузка...</div>
    </div>
    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        
        const user = Telegram.WebApp.initDataUnsafe.user;
        
        if (user) {
            const firstName = user.first_name || '';
            const lastName = user.last_name || '';
            const fullName = (firstName + ' ' + lastName).trim() || 'Пользователь';
            const username = user.username ? '@' + user.username : 'Нет юзернейма';
            const userId = user.id;
            const initial = firstName.charAt(0) || 'U';
            
            document.getElementById('content').innerHTML = `
                <div class="avatar">${initial}</div>
                <div class="name">${fullName}</div>
                <div class="username">${username}</div>
                <div class="info">
                    <div class="info-row">
                        <span class="info-label">ID</span>
                        <span class="info-value">${userId}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Язык</span>
                        <span class="info-value">${user.language_code || 'ru'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Premium</span>
                        <span class="info-value">${user.is_premium ? '✅' : '❌'}</span>
                    </div>
                </div>
            `;
            
            fetch('YOUR_BOT_URL/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: userId,
                    username: user.username,
                    first_name: firstName,
                    last_name: lastName
                })
            }).catch(e => console.log(e));
        } else {
            document.getElementById('content').innerHTML = '<div class="loading">Ошибка авторизации</div>';
        }
    </script>
</body>
</html>
