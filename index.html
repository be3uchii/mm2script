<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<title>Чат</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
img {
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  pointer-events: none;
}
img.clickable {
  pointer-events: auto;
}

html, body {
  height: 100dvh;
  overflow: hidden;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Inter', sans-serif;
  background: #111113;
  color: #e8e8ed;
  display: flex;
  flex-direction: column;
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100dvh;
}

#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  background: #111113;
  padding: 16px;
}

.login-wrapper {
  position: relative;
  width: 300px;
  max-width: 100%;
}

@property --angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}
@keyframes border-spin { to { --angle: 360deg; } }

.login-card {
  background: transparent;
  padding: 0;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  position: relative;
}

.login-title {
  font-size: 22px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: -0.5px;
  text-align: center;
}

.login-subtitle {
  font-size: 11px;
  color: rgba(255,255,255,0.28);
  text-align: center;
  line-height: 1.4;
  margin-top: -4px;
}

.login-tabs {
  display: flex;
  width: 100%;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  gap: 0;
}

.login-tab {
  flex: 1;
  padding: 8px;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: #444450;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
}
.login-tab.active {
  color: #e8e8ed;
  border-bottom-color: #ffffff;
}

.avatar-picker {
  position: relative;
  width: 62px;
  height: 62px;
  cursor: pointer;
  margin: 2px 0;
}

.avatar-circle {
  width: 62px;
  height: 62px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 2px;
  overflow: hidden;
  transition: border-color 0.3s;
}

.avatar-picker:hover .avatar-circle {
  border-color: rgba(255,255,255,0.28);
}

.avatar-circle .hint {
  font-size: 7px;
  color: #3a3a42;
  margin-top: 1px;
}

.avatar-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

.avatar-circle.has-img img { display: block; }
.avatar-circle.has-img svg, .avatar-circle.has-img .hint { display: none; }

.cam-icon {
  position: absolute;
  bottom: -2px;
  right: -2px;
  background: rgba(255,255,255,0.15);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid #111113;
  transition: background 0.2s;
}
.avatar-picker.done .cam-icon { background: #22c55e; }

.login-field {
  width: 100%;
  padding: 8px 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.12);
  border-radius: 0;
  color: #f0f0f5;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s;
  letter-spacing: 0.2px;
  -webkit-appearance: none;
  appearance: none;
  -webkit-user-select: text !important;
  user-select: text !important;
  touch-action: auto !important;
  pointer-events: auto !important;
}
.login-field:focus {
  border-bottom-color: rgba(255,255,255,0.5);
}
.login-field::placeholder { color: rgba(255,255,255,0.2); }

.btn-join {
  width: 100%;
  padding: 10px;
  background: rgba(255,255,255,0.92);
  color: #111113;
  border: none;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
  letter-spacing: 0.3px;
  margin-top: 6px;
}
.btn-join:hover:not(:disabled) { background: #ffffff; }
.btn-join:disabled { opacity: 0.18; cursor: not-allowed; }
input, textarea, button { touch-action: auto !important; pointer-events: auto !important; }

.requirements {
  display: flex;
  gap: 8px;
  width: 100%;
  justify-content: center;
  flex-wrap: wrap;
}

.req-item {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 9px;
  color: rgba(255,255,255,0.2);
  transition: color 0.2s;
}
.req-item.met { color: #22c55e; }
.req-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  transition: background 0.2s;
}
.req-item.met .req-dot { background: #22c55e; }

.error-text {
  color: #f87171;
  font-size: 10px;
  min-height: 12px;
  text-align: center;
  width: 100%;
}

#chat-screen {
  display: none;
  flex-direction: column;
  height: 100%;
  position: relative;
  overflow: hidden;
}

.chat-header {
  padding: 7px 12px;
  background: rgba(17,17,19,0.96);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  flex-shrink: 0;
  z-index: 10;
}

.chat-header .user-info {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #70707e;
  font-weight: 500;
}
.chat-header .user-info img {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  object-fit: cover;
}

.messages-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.messages-area {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  scroll-behavior: auto;
  padding: 10px 12px 72px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;

}

.messages-area::-webkit-scrollbar { display: none; }
.messages-area { scrollbar-width: none; -ms-overflow-style: none; }

.msg-group {
  display: flex;
  gap: 7px;
  max-width: 78%;
  position: relative;
}
.msg-group.self { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  align-self: flex-end;
}

.msg-body {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.msg-username {
  font-size: 9.5px;
  font-weight: 600;
  color: #b0b0be;
  padding: 0 3px;
}

.msg-time {
  display: inline-block;
  font-size: 9px;
  color: rgba(255,255,255,0.28);
  white-space: nowrap;
  line-height: 1;
  vertical-align: bottom;
  margin-left: 4px;
  margin-bottom: -1px;
  pointer-events: none;
}

.msg-bubble-wrap {
  position: relative;
  display: flex;
  align-items: center;
  gap: 4px;
}
.msg-group.self .msg-bubble-wrap { flex-direction: row-reverse; }

.msg-bubble {
  background: #222226;
  border: 1px solid rgba(255,255,255,0.05);
  padding: 4px 8px 4px 8px;
  border-radius: 10px;
  border-bottom-left-radius: 3px;
  font-size: 12px;
  line-height: 1.4;
  color: #d8d8e0;
  word-break: break-word;
  white-space: pre-wrap;
  position: relative;
}
.msg-group.self .msg-bubble {
  background: #2e2e36;
  border-color: rgba(255,255,255,0.07);
  border-bottom-left-radius: 10px;
  border-bottom-right-radius: 3px;
  color: #e8e8f0;
}

.msg-bubble.has-image {
  padding: 3px;
  overflow: hidden;
  background: transparent !important;
  border: none !important;
}

.msg-img-wrap {
  position: relative;
  display: inline-block;
  border-radius: 10px;
  pointer-events: auto;
  overflow: hidden;
  cursor: pointer;
}

.msg-img {
  display: block;
  max-width: 160px;
  max-height: 200px;
  width: 100%;
  border-radius: 10px;
  object-fit: cover;
  -webkit-user-select: none;
  user-select: none;
}

.msg-img-time {
  position: absolute;
  bottom: 5px;
  right: 7px;
  font-size: 9px;
  color: rgba(255,255,255,0.92);
  background: rgba(0,0,0,0.42);
  border-radius: 6px;
  padding: 1px 5px;
  line-height: 16px;
  pointer-events: none;
  white-space: nowrap;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}



.copy-btn {
  opacity: 0;
  background: none;
  border: none;
  border-radius: 0;
  width: 16px;
  height: 16px;
  min-width: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity 0.15s;
  flex-shrink: 0;
  outline: none !important;
  padding: 0;
}
.copy-btn svg { pointer-events: none; }
.msg-group:hover .copy-btn { opacity: 1; }

.msg-group:not(.msg-continuation) { margin-top: 8px; }
.msg-group:first-child { margin-top: 0; }
.msg-continuation { margin-top: 2px; }
.msg-continuation .msg-avatar { visibility: hidden; }
.msg-continuation .msg-username { display: none; }
.msg-continuation .msg-bubble { border-bottom-left-radius: 3px; }
.msg-continuation.self .msg-bubble { border-bottom-right-radius: 3px; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  color: #2a2a30;
  font-size: 11px;
  padding-bottom: 72px;
}

.chat-input-float {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 8px 10px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  z-index: 20;
  pointer-events: none;
}

.image-preview-bar {
  display: none;
  align-items: center;
  justify-content: flex-start;
  background: rgba(22,22,26,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 14px 14px 0 0;
  padding: 8px 12px;
  margin-bottom: 0;
  pointer-events: all;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.image-preview-bar.visible { display: flex; }

.image-preview-thumb {
  position: relative;
  flex-shrink: 0;
}

.image-preview-thumb img {
  width: 60px;
  height: 60px;
  border-radius: 8px;
  object-fit: cover;
  display: block;
}

.image-remove-btn {
  position: absolute;
  top: -5px;
  right: -5px;
  width: 16px;
  height: 16px;
  background: #f87171;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  outline: none !important;
  flex-shrink: 0;
}

.input-pill {
  display: flex;
  align-items: center;
  background: rgba(22, 22, 26, 0.88);
  backdrop-filter: blur(24px) saturate(1.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  border-radius: 20px;
  padding: 0 6px 0 10px;
  height: 40px;
  gap: 6px;
  pointer-events: all;
  box-shadow:
    0 4px 28px rgba(0,0,0,0.6),
    0 1px 0 rgba(255,255,255,0.05) inset;
}

.image-preview-bar.visible + .input-pill {
  border-radius: 0 0 20px 20px;
  box-shadow: 0 4px 28px rgba(0,0,0,0.6);
}

.btn-attach {
  width: 28px;
  height: 28px;
  min-width: 28px;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: background 0.15s;
  outline: none !important;
  flex-shrink: 0;
  padding: 0;
}
.btn-attach:hover { background: rgba(255,255,255,0.07); }
.btn-attach.has-image svg { stroke: #60a5fa; }

.input-pill textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: #e8e8ed;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  outline: none !important;
  resize: none;
  height: 22px;
  max-height: 100px;
  line-height: 22px;
  padding: 0;
  margin: 0;
  overflow: hidden;
  display: block;
  box-shadow: none !important;
  -webkit-appearance: none;
  appearance: none;
  vertical-align: middle;
  -webkit-user-select: text;
  user-select: text;
}
.input-pill textarea:focus { outline: none !important; box-shadow: none !important; }
.input-pill textarea::placeholder { color: #3a3a42; }

.btn-send {
  width: 30px;
  height: 30px;
  min-width: 30px;
  background: #ffffff;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  outline: none !important;
}
.btn-send:hover:not(:disabled) { background: #d0d0d8; }
.btn-send:disabled { opacity: 0.15; cursor: not-allowed; }

.logout-btn {
  background: none;
  border: none;
  color: #3a3a42;
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s;
  outline: none !important;
}
.logout-btn:hover { color: #f87171; }

.img-lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 100;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.img-lightbox.open { display: flex; }
.img-lightbox img {
  max-width: 94vw;
  max-height: 88vh;
  border-radius: 10px;
  pointer-events: none;
  -webkit-touch-callout: none;
  object-fit: contain;
  -webkit-user-select: none;
  user-select: none;
}
.img-lightbox-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(255,255,255,0.12);
  border: none;
  border-radius: 50%;
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  outline: none !important;
}

@media (max-width: 480px) {
  .login-wrapper { width: 100%; }
  .login-card { padding: 18px 14px 14px; border-radius: 16px; }
  .chat-header { padding: 6px 10px; }
  .messages-area { padding: 8px 8px 68px 8px; gap: 4px; }
  .msg-group { max-width: 86%; }
  .msg-bubble { font-size: 12px; }
  .msg-avatar { width: 24px; height: 24px; }
  .chat-input-float { padding: 6px 8px; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
  .input-pill { height: 38px; padding: 0 5px 0 8px; }
  .input-pill textarea { font-size: 13px; line-height: 22px; height: 22px; }
  .btn-send { width: 28px; height: 28px; min-width: 28px; }
  .copy-btn { opacity: 1; width: 22px; height: 22px; min-width: 22px; }
  .msg-img { max-width: 150px; max-height: 180px; }
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-title">Общий чат</div>
      <div class="login-subtitle">Открытый чат для всех</div>

      <div class="login-tabs">
        <button class="login-tab active" id="tab-login">Вход</button>
        <button class="login-tab" id="tab-register">Регистрация</button>
      </div>

      <div id="register-fields" style="display:none;flex-direction:column;align-items:center;gap:14px;width:100%;">
        <div class="avatar-picker" id="avatar-picker">
          <div class="avatar-circle" id="avatar-circle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <img id="avatar-preview" alt="" />
          </div>
          <div class="cam-icon">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </div>
        </div>
        <input type="file" id="avatar-input" accept="image/*" style="display:none" />
        <input type="text" class="login-field" id="reg-username" placeholder="Никнейм (a-z, 0-9)" maxlength="12" autocomplete="off" spellcheck="false" />
        <input type="password" class="login-field" id="reg-password" placeholder="Пароль (мин. 4 символа)" maxlength="64" autocomplete="new-password" />
        <div class="requirements">
          <div class="req-item" id="req-name"><span class="req-dot"></span> Ник 2-12</div>
          <div class="req-item" id="req-pass"><span class="req-dot"></span> Пароль 4+</div>
          <div class="req-item" id="req-avatar"><span class="req-dot"></span> Аватар</div>
        </div>
        <div class="error-text" id="reg-error"></div>
        <button class="btn-join" id="btn-register" disabled>Зарегистрироваться</button>
      </div>

      <div id="login-fields" style="display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;">
        <input type="text" class="login-field" id="login-username" placeholder="Никнейм" maxlength="12" autocomplete="off" spellcheck="false" />
        <input type="password" class="login-field" id="login-password" placeholder="Пароль" maxlength="64" autocomplete="current-password" />
        <div class="error-text" id="login-error"></div>
        <button class="btn-join" id="btn-login" disabled>Войти</button>
      </div>
    </div>
  </div>
</div>

<div id="chat-screen">
  <div class="chat-header">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="user-info" id="header-user-info"></div>
      <button class="logout-btn" id="btn-logout" title="Выйти">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="messages-wrap">
    <div class="messages-area" id="messages-area">
      <div class="empty-state" id="empty-state">
        <span>Пока нет сообщений</span>
      </div>
    </div>

    <div class="chat-input-float" id="chat-input-float">
      <div class="image-preview-bar" id="image-preview-bar">
        <div class="image-preview-thumb">
          <img id="image-preview-thumb-img" src="" alt="" />
          <button class="image-remove-btn" id="image-remove-btn">
            <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-pill">
        <button class="btn-attach" id="btn-attach" title="Прикрепить изображение">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <input type="file" id="image-input" accept="image/*" style="display:none" />
        <textarea id="msg-input" rows="1" placeholder="Сообщение..." maxlength="1000"></textarea>
        <button class="btn-send" id="btn-send" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#111113" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="img-lightbox" id="img-lightbox">
  <button class="img-lightbox-close" id="img-lightbox-close">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
  <img id="img-lightbox-img" src="" alt="" />
</div>

<script>
document.addEventListener('contextmenu', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
document.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
document.addEventListener('touchstart', e => { if (e.target.tagName === 'IMG') e.target.style.webkitUserSelect = 'none'; }, { passive: true });

const SUPABASE_URL = 'https://uqtciwalgbfqsqjowktl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_laj9J-wAwAQB_3ClaONM-g_5O5NK3hZ';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  realtime: { params: { eventsPerSecond: 20 } }
});

const MSG_CACHE_KEY = 'chat_messages_v3';
const MSG_CACHE_LIMIT = 200;

let currentUser = { username: '', avatarUrl: '' };
let avatarFile = null;
let chatImageFile = null;
let chatImageDataUrl = null;
let messages = [];
let sending = false;
const avatarCache = {};
const imageUrlCache = {};

const $ = (s) => document.querySelector(s);

const loginScreen    = $('#login-screen');
const chatScreen     = $('#chat-screen');
const messagesArea   = $('#messages-area');
const emptyState     = $('#empty-state');
const msgInput       = $('#msg-input');
const btnSend        = $('#btn-send');
const headerUserInfo = $('#header-user-info');
const btnLogout      = $('#btn-logout');
const inputFloat     = $('#chat-input-float');

const tabRegister    = $('#tab-register');
const tabLogin       = $('#tab-login');
const registerFields = $('#register-fields');
const loginFields    = $('#login-fields');

const regUsername  = $('#reg-username');
const regPassword  = $('#reg-password');
const regError     = $('#reg-error');
const btnRegister  = $('#btn-register');
const avatarInput  = $('#avatar-input');
const avatarPreview= $('#avatar-preview');
const avatarCircle = $('#avatar-circle');
const avatarPicker = $('#avatar-picker');
const reqName      = $('#req-name');
const reqPass      = $('#req-pass');
const reqAvatar    = $('#req-avatar');

const loginUsername= $('#login-username');
const loginPassword= $('#login-password');
const loginError   = $('#login-error');
const btnLogin     = $('#btn-login');

const btnAttach          = $('#btn-attach');
const imageInput         = $('#image-input');
const imagePreviewBar    = $('#image-preview-bar');
const imagePreviewThumb  = $('#image-preview-thumb-img');
const imageRemoveBtn     = $('#image-remove-btn');

const imgLightbox      = $('#img-lightbox');
const imgLightboxImg   = $('#img-lightbox-img');
const imgLightboxClose = $('#img-lightbox-close');

const validUsername = /^[a-zA-Z0-9]{2,12}$/;

tabRegister.addEventListener('click', () => {
  tabRegister.classList.add('active');
  tabLogin.classList.remove('active');
  registerFields.style.display = 'flex';
  loginFields.style.display = 'none';
  regError.textContent = '';
});

tabLogin.addEventListener('click', () => {
  tabLogin.classList.add('active');
  tabRegister.classList.remove('active');
  loginFields.style.display = 'flex';
  registerFields.style.display = 'none';
  loginError.textContent = '';
});

function checkRegReady() {
  const nameOk   = validUsername.test(regUsername.value);
  const passOk   = regPassword.value.length >= 4;
  const avatarOk = !!avatarFile;
  reqName.classList.toggle('met', nameOk);
  reqPass.classList.toggle('met', passOk);
  reqAvatar.classList.toggle('met', avatarOk);
  btnRegister.disabled = !(nameOk && passOk && avatarOk);
}

function checkLoginReady() {
  btnLogin.disabled = !(loginUsername.value.trim().length >= 2 && loginPassword.value.length >= 4);
}

regUsername.addEventListener('input', () => { regError.textContent = ''; checkRegReady(); });
regPassword.addEventListener('input', () => { regError.textContent = ''; checkRegReady(); });
loginUsername.addEventListener('input', () => { loginError.textContent = ''; checkLoginReady(); });
loginUsername.addEventListener('keyup', () => { checkLoginReady(); });
loginPassword.addEventListener('input', () => { loginError.textContent = ''; checkLoginReady(); });
loginPassword.addEventListener('keyup', () => { checkLoginReady(); });

avatarPicker.addEventListener('click', () => { avatarInput.click(); });

avatarInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { regError.textContent = 'Аватар должен быть менее 2MB'; return; }
  avatarFile = file;
  const reader = new FileReader();
  reader.onload = (ev) => {
    avatarPreview.src = ev.target.result;
    avatarCircle.classList.add('has-img');
    avatarPicker.classList.add('done');
    checkRegReady();
  };
  reader.readAsDataURL(file);
  regError.textContent = '';
});

async function hashPassword(password) {
  const data = new TextEncoder().encode(password);
  const buf  = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

btnRegister.addEventListener('click', doRegister);
regPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !btnRegister.disabled) doRegister(); });

async function doRegister() {
  const username = regUsername.value.trim().toLowerCase();
  if (!validUsername.test(username)) { regError.textContent = 'Только англ. буквы и цифры, 2-12 символов'; return; }
  if (regPassword.value.length < 4)  { regError.textContent = 'Пароль минимум 4 символа'; return; }
  if (!avatarFile)                    { regError.textContent = 'Загрузите аватар'; return; }

  btnRegister.disabled = true;
  btnRegister.textContent = 'Регистрация...';

  const { data: existing } = await sb.from('users').select('username').eq('username', username).maybeSingle();
  if (existing) {
    regError.textContent = 'Этот ник уже занят';
    btnRegister.disabled = false;
    btnRegister.textContent = 'Зарегистрироваться';
    return;
  }

  const ext  = avatarFile.name.split('.').pop();
  const path = username + '_' + Date.now() + '.' + ext;
  const { error: uploadErr } = await sb.storage.from('avatars').upload(path, avatarFile, {
    cacheControl: '31536000', upsert: false
  });
  if (uploadErr) {
    regError.textContent = 'Ошибка загрузки аватара';
    btnRegister.disabled = false;
    btnRegister.textContent = 'Зарегистрироваться';
    return;
  }

  const { data: urlData }  = sb.storage.from('avatars').getPublicUrl(path);
  const avatarUrl  = urlData.publicUrl;
  const passHash   = await hashPassword(regPassword.value);

  const { error: insertErr } = await sb.from('users').insert({ username, password_hash: passHash, avatar_url: avatarUrl });
  if (insertErr) {
    regError.textContent = 'Ошибка регистрации';
    btnRegister.disabled = false;
    btnRegister.textContent = 'Зарегистрироваться';
    return;
  }

  currentUser = { username, avatarUrl };
  localStorage.setItem('chat_user', JSON.stringify(currentUser));
  showChat();
}

btnLogin.addEventListener('click', doLogin);
loginPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !btnLogin.disabled) doLogin(); });

async function doLogin() {
  const username = loginUsername.value.trim().toLowerCase();
  if (!username || loginPassword.value.length < 4) return;

  btnLogin.disabled = true;
  btnLogin.textContent = 'Вход...';

  const passHash = await hashPassword(loginPassword.value);
  const { data: user } = await sb.from('users').select('*').eq('username', username).maybeSingle();

  if (!user)                           { loginError.textContent = 'Пользователь не найден'; btnLogin.textContent = 'Войти'; checkLoginReady(); return; }
  if (user.password_hash !== passHash)  { loginError.textContent = 'Неверный пароль';       btnLogin.textContent = 'Войти'; checkLoginReady(); return; }

  currentUser = { username: user.username, avatarUrl: user.avatar_url };
  localStorage.setItem('chat_user', JSON.stringify(currentUser));
  showChat();
}

function showChat() {
  loginScreen.style.display = 'none';
  chatScreen.style.display  = 'flex';

  headerUserInfo.innerHTML =
    '<img src="' + currentUser.avatarUrl + '" alt="" loading="lazy">' +
    '<span>' + escapeHtml(currentUser.username) + '</span>';

  loadMessages();
  subscribeRealtime();
}

function saveMessagesCache(msgs) {
  try {
    const toSave = msgs
      .filter(m => !m._temp && m.id)
      .map(m => ({
        id: m.id,
        username: m.username,
        avatar_url: m.avatar_url,
        content: m.content,
        image_url: m.image_url || null,
        created_at: m.created_at
      }))
      .slice(-MSG_CACHE_LIMIT);
    localStorage.setItem(MSG_CACHE_KEY, JSON.stringify(toSave));
  } catch(e) {}
}

function loadMessagesCache() {
  try {
    const raw = localStorage.getItem(MSG_CACHE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

async function loadMessages() {
  const cached = loadMessagesCache();
  if (cached && cached.length > 0) {
    messages = cached;
    renderMessages(true);
    scrollToBottom();
  }

  const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true }).limit(MSG_CACHE_LIMIT);

  if (data && data.length > 0) {
    messages = data;
    saveMessagesCache(messages);
    renderMessages(true);
    scrollToBottom();
  } else if (!cached || cached.length === 0) {
    messages = [];
    renderMessages(true);
  }
}

function appendMsgEl(m, idx) {
  const isSelf = m.username === currentUser.username;
  const prevMsg = idx > 0 ? messages[idx - 1] : null;
  const isCont = prevMsg && prevMsg.username === m.username;
  const el = buildMsgEl(m, isCont, isSelf);
  messagesArea.appendChild(el);
  return el;
}

function subscribeRealtime() {
  sb.channel('chat-room')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
      const msg = payload.new;
      const isMine = msg.username === currentUser.username;

      const tempIdx = messages.findIndex(m => m._temp && m.username === msg.username && (m.image_url ? !!msg.image_url : !msg.image_url));
      if (tempIdx !== -1) {
        messages[tempIdx] = msg;
        saveMessagesCache(messages);
        if (isMine) {
          const tempEl = messagesArea.querySelector('[data-id^="t_"]');
          if (tempEl) {
            tempEl.dataset.id = String(msg.id);
            if (msg.image_url) {
              const msgImg = tempEl.querySelector('.msg-img');
              if (msgImg && msg.image_url !== '__pending__') {
                imageUrlCache[msg.image_url] = msg.image_url;
                msgImg.src = msg.image_url;
              }
            }
          }
        }
        return;
      }

      if (messages.find(m => m.id === msg.id)) return;

      const atBottom = messagesArea.scrollTop + messagesArea.clientHeight >= messagesArea.scrollHeight - 80;
      messages.push(msg);
      if (messages.length > MSG_CACHE_LIMIT) messages = messages.slice(-MSG_CACHE_LIMIT);
      saveMessagesCache(messages);

      if (emptyState.style.display !== 'none') emptyState.style.display = 'none';
      appendMsgEl(msg, messages.length - 1);
      if (atBottom) scrollToBottom();
    })
    .subscribe();
}

function formatTime(ts) {
  return new Date(ts).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

const COPY_ICON = `<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const CHECK_ICON = `<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

let _tempIdCounter = 0;

function makeCopyBtn(m) {
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.title = 'Копировать';
  btn.innerHTML = COPY_ICON;
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const text = m.username + ': ' + m.content;
    navigator.clipboard.writeText(text).then(() => {
      btn.innerHTML = CHECK_ICON;
      setTimeout(() => { btn.innerHTML = COPY_ICON; }, 1500);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.innerHTML = CHECK_ICON;
      setTimeout(() => { btn.innerHTML = COPY_ICON; }, 1500);
    });
  });
  return btn;
}

function openLightbox(src) {
  imgLightboxImg.src = src;
  imgLightbox.classList.add('open');
}

function closeLightbox() {
  imgLightbox.classList.remove('open');
  imgLightboxImg.src = '';
}

imgLightboxClose.addEventListener('click', closeLightbox);
imgLightbox.addEventListener('click', (e) => { if (e.target === imgLightbox) closeLightbox(); });

function buildMsgEl(m, isCont, isSelf) {
  const av = avatarCache[m.avatar_url] || m.avatar_url || '';
  if (m.avatar_url && !avatarCache[m.avatar_url]) avatarCache[m.avatar_url] = m.avatar_url;

  const wrap = document.createElement('div');
  wrap.className = 'msg-group' + (isCont ? ' msg-continuation' : '') + (isSelf ? ' self' : '');
  wrap.dataset.id = m._tempId ? ('t_' + m._tempId) : String(m.id);

  const img = document.createElement('img');
  img.className = 'msg-avatar';
  img.src = av;
  img.alt = '';
  img.loading = 'lazy';
  wrap.appendChild(img);

  const body = document.createElement('div');
  body.className = 'msg-body';

  if (!isCont && !isSelf) {
    const uname = document.createElement('span');
    uname.className = 'msg-username';
    uname.textContent = m.username;
    body.appendChild(uname);
  }

  const bwrap = document.createElement('div');
  bwrap.className = 'msg-bubble-wrap';

  const timeStr = formatTime(m.created_at || new Date().toISOString());

  if (m.image_url === '__pending__' && m._tempImageDataUrl) {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble has-image';
    const imgWrap = document.createElement('div');
    imgWrap.className = 'msg-img-wrap';
    const msgImg = document.createElement('img');
    msgImg.className = 'msg-img';
    msgImg.src = m._tempImageDataUrl;
    msgImg.alt = '';
    imgWrap.appendChild(msgImg);
    const timeOverlay = document.createElement('span');
    timeOverlay.className = 'msg-img-time';
    timeOverlay.textContent = formatTime(m.created_at || new Date().toISOString());
    imgWrap.appendChild(timeOverlay);
    bubble.appendChild(imgWrap);
    bwrap.appendChild(bubble);
    body.appendChild(bwrap);
    wrap.appendChild(body);
    return wrap;
  } else if (m.image_url && m.image_url !== '__pending__') {
    const realSrc = imageUrlCache[m.image_url] || m.image_url;
    imageUrlCache[m.image_url] = realSrc;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble has-image';

    const imgWrap = document.createElement('div');
    imgWrap.className = 'msg-img-wrap';

    const msgImg = document.createElement('img');
    msgImg.className = 'msg-img';
    msgImg.src = m._tempImageDataUrl || realSrc;
    msgImg.alt = '';
    msgImg.loading = 'lazy';
    imgWrap.addEventListener('click', () => { openLightbox(msgImg.src); });
    imgWrap.appendChild(msgImg);

    const timeOverlay = document.createElement('span');
    timeOverlay.className = 'msg-img-time';
    timeOverlay.textContent = timeStr;
    imgWrap.appendChild(timeOverlay);

    bubble.appendChild(imgWrap);
    bwrap.appendChild(bubble);
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    const textSpan = document.createElement('span');
    textSpan.textContent = m.content.trim();

    const timeSpan = document.createElement('span');
    timeSpan.className = 'msg-time';
    timeSpan.textContent = timeStr;

    const isOneLiner = m.content.split('\n').length === 1 && m.content.length <= 28;
    if (isOneLiner) {
      bubble.style.cssText = 'display:inline-flex;align-items:flex-end;gap:5px;padding-right:8px;';
      textSpan.style.cssText = 'line-height:1.45;word-break:break-word;white-space:pre-wrap;min-width:0;';
      timeSpan.style.cssText = 'flex-shrink:0;padding-bottom:1px;';
    } else {
      bubble.style.cssText = 'display:block;padding-bottom:16px;';
      textSpan.style.cssText = 'line-height:1.45;word-break:break-word;white-space:pre-wrap;display:block;';
      timeSpan.style.cssText = 'position:absolute;bottom:4px;right:8px;';
    }

    bubble.appendChild(textSpan);
    bubble.appendChild(timeSpan);
    bwrap.appendChild(bubble);

    if (!m._temp && !isSelf) bwrap.appendChild(makeCopyBtn(m));
  }

  body.appendChild(bwrap);
  wrap.appendChild(body);
  return wrap;
}

function renderMessages(initial) {
  if (messages.length === 0) { emptyState.style.display = 'flex'; return; }
  emptyState.style.display = 'none';
  if (!initial) return;

  messagesArea.innerHTML = '';
  for (let i = 0; i < messages.length; i++) {
    const m = messages[i];
    const isSelf = m.username === currentUser.username;
    const isCont = i > 0 && messages[i - 1].username === m.username;
    messagesArea.appendChild(buildMsgEl(m, isCont, isSelf));
  }
}

function scrollToBottom(instant) {
  if (instant) {
    requestAnimationFrame(() => {
      messagesArea.scrollTop = messagesArea.scrollHeight;
    });
  } else {
    smoothScrollToBottom(300);
  }
}

msgInput.addEventListener('input', () => {
  updateSendBtn();
  msgInput.style.height = 'auto';
  const newH = Math.min(msgInput.scrollHeight, 100);
  msgInput.style.height = newH + 'px';
  msgInput.style.overflow = newH >= 100 ? 'auto' : 'hidden';
});

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!btnSend.disabled) sendMessage();
  }
});

function updateSendBtn() {
  btnSend.disabled = !(chatImageFile || (!msgInput.disabled && msgInput.value.trim()));
}

btnAttach.addEventListener('click', () => { imageInput.click(); });

imageInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { alert('Изображение должно быть менее 10MB'); return; }
  chatImageFile = file;
  const reader = new FileReader();
  reader.onload = (ev) => {
    chatImageDataUrl = ev.target.result;
    imagePreviewThumb.src = chatImageDataUrl;
    imagePreviewBar.classList.add('visible');
    btnAttach.classList.add('has-image');
    msgInput.value = '';
    msgInput.disabled = true;
    msgInput.placeholder = 'Изображение выбрано';
    updateSendBtn();
  };
  reader.readAsDataURL(file);
  imageInput.value = '';
});

imageRemoveBtn.addEventListener('click', () => {
  chatImageFile = null;
  chatImageDataUrl = null;
  imagePreviewThumb.src = '';
  imagePreviewBar.classList.remove('visible');
  btnAttach.classList.remove('has-image');
  msgInput.disabled = false;
  msgInput.placeholder = 'Сообщение...';
  updateSendBtn();
});

function isNearBottom(threshold = 150) {
  return messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight <= threshold;
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesArea.scrollTop = messagesArea.scrollHeight;
  });
}

msgInput.addEventListener('focus', () => {
  setTimeout(() => {
    scrollToBottom();
  }, 150);
});

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    setTimeout(() => {
      scrollToBottom();
    }, 60);
  });
}

btnSend.addEventListener('click', sendMessage);

async function sendMessage() {
  const content = msgInput.value.trim();
  if ((!content && !chatImageFile) || sending) return;

  sending = true;

  const imageFile = chatImageFile;
  const imageDataUrl = chatImageDataUrl;

  msgInput.value = '';
  msgInput.style.height = '22px';
  msgInput.style.overflow = 'hidden';
  msgInput.disabled = false;
  msgInput.placeholder = 'Сообщение...';
  btnSend.disabled = true;
  msgInput.blur();

  chatImageFile = null;
  chatImageDataUrl = null;
  imagePreviewThumb.src = '';
  imagePreviewBar.classList.remove('visible');
  btnAttach.classList.remove('has-image');

  const tempId = ++_tempIdCounter;
  const tempMsg = {
    _temp: true,
    _tempId: tempId,
    username:   currentUser.username,
    avatar_url: currentUser.avatarUrl,
    content:    imageFile ? ' ' : content,
    image_url:  imageFile ? '__pending__' : null,
    _tempImageDataUrl: imageDataUrl || null,
    created_at: new Date().toISOString()
  };
  messages.push(tempMsg);
  if (emptyState.style.display !== 'none') emptyState.style.display = 'none';
  appendMsgEl(tempMsg, messages.length - 1);
  scrollToBottom();

  let image_url = null;

  if (imageFile) {
    const ext = imageFile.name.split('.').pop().toLowerCase();
    const path = currentUser.username + '_' + Date.now() + '.' + ext;
    const { error: uploadErr } = await sb.storage.from('chat-images').upload(path, imageFile, {
      cacheControl: '31536000', upsert: false
    });
    if (!uploadErr) {
      const { data: urlData } = sb.storage.from('chat-images').getPublicUrl(path);
      image_url = urlData.publicUrl;
    }
  }

  const { data: inserted, error: insertErr } = await sb.from('messages').insert({
    username:   currentUser.username,
    avatar_url: currentUser.avatarUrl || null,
    content:    imageFile ? ' ' : content,
    image_url:  image_url
  }).select().single();

  if (insertErr) { console.error('Insert error:', insertErr); }
  if (inserted) {
    const tempIdx = messages.findIndex(m => m._tempId === tempId);
    if (tempIdx !== -1) {
      messages[tempIdx] = inserted;
      saveMessagesCache(messages);
      const tempEl = messagesArea.querySelector('[data-id="t_' + tempId + '"]');
      if (tempEl) {
        tempEl.dataset.id = String(inserted.id);
        if (inserted.image_url) {
          const msgImg = tempEl.querySelector('.msg-img');
          if (msgImg) {
            imageUrlCache[inserted.image_url] = inserted.image_url;
            msgImg.src = inserted.image_url;
          }
        }
      }
    }
  }

  sending = false;
}

btnLogout.addEventListener('click', () => {
  localStorage.clear();
  sessionStorage.clear();
  location.reload();
});

const saved = localStorage.getItem('chat_user');
if (saved) {
  try {
    const u = JSON.parse(saved);
    if (u.username && u.avatarUrl) {
      currentUser = u;
      showChat();
    }
  } catch(e) {}
}
</script>
</body>
</html>
