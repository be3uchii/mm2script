<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        #auth-screen, #profile-screen {
            display: none;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 1px solid #333;
            margin-bottom: 20px;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 200;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            margin: 0 0 5px 0;
            letter-spacing: -0.5px;
        }

        .username {
            font-size: 14px;
            color: #666;
            margin-bottom: 40px;
        }

        .btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 14px 50px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.96);
            background: #cccccc;
        }

        .btn-outline {
            background: transparent;
            color: #ffffff;
            border: 1px solid #333;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="avatar" style="font-size: 30px;">●</div>
        <h1>Minimalist</h1>
        <div class="username" style="margin-bottom: 40px;">System Protected</div>
        <button class="btn" onclick="login()">Enter</button>
    </div>

    <div id="profile-screen">
        <img id="user-photo" class="avatar" src="" alt="" onerror="this.style.display='none'; document.getElementById('avatar-placeholder').style.display='flex'">
        <div id="avatar-placeholder" class="avatar" style="display:none;"></div>
        
        <h1 id="user-name">User</h1>
        <div class="username" id="user-handle">@username</div>
        
        <button class="btn" onclick="tg.close()">Close</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');
        tg.setBackgroundColor('#000000');

        function login() {
            const user = tg.initDataUnsafe?.user;
            
            if (user) {
                document.getElementById('user-name').innerText = user.first_name;
                document.getElementById('user-handle').innerText = user.username ? '@' + user.username : 'ID: ' + user.id;
                
                if (user.username) {
                    document.getElementById('user-photo').src = 'https://t.me/i/userpic/320/' + user.username + '.jpg';
                } else {
                    document.getElementById('user-photo').style.display = 'none';
                    document.getElementById('avatar-placeholder').style.display = 'flex';
                    document.getElementById('avatar-placeholder').innerText = user.first_name.charAt(0);
                }
            }

            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'block';
            tg.HapticFeedback.impactOccurred('medium');
        }

        window.onload = () => {
            document.getElementById('auth-screen').style.display = 'block';
            tg.ready();
        };
    </script>
</body>
</html>
