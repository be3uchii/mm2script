<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
        }

        #screen {
            text-align: center;
            width: 100%;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 1px solid #333;
            margin: 0 auto 25px;
            background-size: cover;
            background-position: center;
            background-color: #111;
        }

        h1 {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        .id-label {
            color: #555;
            font-size: 13px;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 15px 60px;
            border-radius: 2px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn:active { background: #888; }
    </style>
</head>
<body>

    <div id="screen">
        <div id="avatar" class="profile-img"></div>
        <h1 id="name">UNNAMED</h1>
        <div id="id" class="id-label">ID: 00000000</div>
        <button class="btn" onclick="tg.close()">Exit</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');
        tg.setBackgroundColor('#000000');

        // Парсим параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const photoUrl = urlParams.get('photo');

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('name').innerText = user.first_name.toUpperCase();
            document.getElementById('id').innerText = "ID: " + user.id;
            
            if (photoUrl && photoUrl !== "null") {
                document.getElementById('avatar').style.backgroundImage = `url('${photoUrl}')`;
            } else {
                document.getElementById('avatar').style.display = 'none';
            }
        }

        tg.ready();
    </script>
</body>
</html>
