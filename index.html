<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #0f172a);
            --card-bg: var(--tg-theme-secondary-bg-color, #1e293b);
            --text: var(--tg-theme-text-color, #f8fafc);
            --hint: var(--tg-theme-hint-color, #94a3b8);
            --accent: var(--tg-theme-button-color, #38bdf8);
            --accent-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
        }

        .app-card {
            background: var(--card-bg);
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .avatar-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            border: 4px solid var(--card-bg);
        }

        h2 { margin: 10px 0 5px; font-size: 24px; font-weight: 700; }
        .username { color: var(--accent); font-size: 16px; margin-bottom: 30px; display: block; }

        .btn {
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            padding: 16px 40px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active { transform: scale(0.98); opacity: 0.9; }

        #login-screen { display: block; }
        #profile-screen { display: none; }

        .status-badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="app-card">
        <div class="avatar-container">🔐</div>
        <h2>Авторизация</h2>
        <p style="color: var(--hint); margin-bottom: 30px;">Войдите через Telegram для доступа</p>
        <button class="btn" onclick="login()">Войти в аккаунт</button>
    </div>

    <div id="profile-screen" class="app-card">
        <div class="status-badge">АКТИВЕН</div>
        <div class="avatar-container" id="user-letter">?</div>
        <h2 id="user-name">Пользователь</h2>
        <span class="username" id="user-handle">@username</span>
        <button class="btn" style="background: var(--card-bg); border: 1px solid var(--hint); color: var(--text);" onclick="tg.close()">Выйти</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('bg_color');

        function login() {
            const user = tg.initDataUnsafe?.user;
            
            if (user) {
                document.getElementById('user-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
                document.getElementById('user-handle').innerText = user.username ? '@' + user.username : 'ID: ' + user.id;
                document.getElementById('user-letter').innerText = user.first_name.charAt(0);
            }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'block';
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        tg.ready();
    </script>
</body>
</html>
